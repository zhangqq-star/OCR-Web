<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F2F2F7">
  <meta name="description" content="本地化 OCR 货架管理系统">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="src/icons/icon-192.png">
  <link rel="apple-touch-icon" href="src/icons/icon-192.png">
  <title>货架管理</title>
  <link rel="stylesheet" href="src/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.10/dist/sql-wasm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

  <!-- 流动背景光斑 -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- 顶部标题栏 -->
  <header class="header">
    <h1>📦 货架管理 <span style="font-size:0.65rem;opacity:0.45;font-weight:400;margin-left:2px;">v2.0</span></h1>
    <div class="header-right">
      <span id="spaceBadge" class="space-badge" title="切换空间">个人</span>
      <button id="btnProfile" class="btn-icon" title="账号与空间">👤</button>
      <button id="btnExport" class="btn-icon" title="导出 Excel">📥</button>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="main">
    <!-- 扫描视图 -->
    <section id="viewScan" class="view active">
      <div class="scan-container">
        <div id="batchStatus" class="batch-status hidden">
          <span id="batchStatusText" class="batch-status-text"></span>
          <div class="batch-progress-track"><div id="batchProgressFill" class="batch-progress-fill"></div></div>
          <button id="btnBatchExitTop" class="batch-exit-btn">结束</button>
        </div>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" class="hidden"></canvas>
        <div id="scanPlaceholder" class="scan-placeholder glass-card">
          <div class="scan-icon">📷</div>
          <p>点击下方按钮启动摄像头</p>
        </div>
        <div id="ocrProgress" class="ocr-progress hidden">
          <div class="spinner"></div>
          <p id="ocrProgressText">识别中...</p>
        </div>
      </div>
      <div class="scan-actions">
        <button id="btnCapture" class="btn-capture hidden">📸 拍照识别</button>
        <button id="btnStartCamera" class="btn-capture">📷 打开摄像头</button>
        <button id="btnStopCamera" class="btn-secondary hidden">关闭摄像头</button>
        <button id="btnBatchImport" class="btn-capture" style="background:#34C759;">📦 连续导入</button>
      </div>
    </section>

    <!-- 货架视图 -->
    <section id="viewShelf" class="view">
      <div class="shelf-nav">
        <button id="btnShelfPrev" class="btn-nav-arrow" title="上一个货架">◀</button>
        <span id="shelfName" class="shelf-name">货架 1</span>
        <button id="btnShelfNext" class="btn-nav-arrow" title="下一个货架">▶</button>
        <button id="btnShelfAdd" class="btn-nav-add" title="新建货架">＋</button>
      </div>
      <div id="shelfSwipeArea" class="shelf-swipe-area">
        <div id="shelfGrid" class="shelf-grid"></div>
      </div>
      <div class="shelf-info">
        <span id="shelfStats">共 0 个零件</span>
        <span id="shelfIndicator" class="shelf-indicator"></span>
      </div>
    </section>

  </main>

  <!-- 底部导航栏 -->
  <nav class="tab-bar">
    <button class="tab active" data-view="viewScan">📷 扫描</button>
    <button class="tab" data-view="viewShelf">📋 货架</button>
  </nav>

  <!-- 货架位置选择弹窗 -->
  <div id="modalPosition" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card glass-card">
      <h3>选择货架位置</h3>
      <label>零件编号（10位）</label>
      <input type="text" id="positionCode" pattern="\d{10}" maxlength="10" inputmode="numeric" placeholder="10位数字编号">
      <div class="position-grid" id="positionGrid"></div>
      <div class="modal-actions">
        <button id="btnPositionCancel" class="btn-secondary">取消</button>
      </div>
    </div>
  </div>

  <!-- 连续导入起始位置选择弹窗 -->
  <div id="modalBatchStart" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card glass-card">
      <h3>📦 连续导入 — 选择起始位置</h3>
      <label>目标货架</label>
      <select id="batchShelfSelect" class="batch-shelf-select"></select>
      <label>填充方向</label>
      <div class="segmented-control" id="batchDirection">
        <button class="seg-btn active" data-dir="row-first">先行后列 →</button>
        <button class="seg-btn" data-dir="col-first">先列后行 ↓</button>
      </div>
      <label>覆盖策略</label>
      <div class="segmented-control" id="batchPolicy">
        <button class="seg-btn active" data-policy="skip">跳过已占用</button>
        <button class="seg-btn" data-policy="overwrite">覆盖</button>
        <button class="seg-btn" data-policy="stop">遇占用停止</button>
      </div>
      <label>点击网格选择起始位置</label>
      <div class="position-grid" id="batchPositionGrid"></div>
      <div class="modal-actions">
        <button id="btnBatchCancel" class="btn-secondary">取消</button>
        <button id="btnBatchStart" class="btn-primary">开始导入</button>
      </div>
    </div>
  </div>

  <!-- 连续导入完成汇总弹窗 -->
  <div id="modalBatchSummary" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card glass-card">
      <h3>📦 连续导入完成</h3>
      <div class="batch-summary">
        <div class="batch-summary-row">
          <span>导入成功</span>
          <span id="batchSummarySuccess" class="batch-summary-num">0</span>
        </div>
        <div class="batch-summary-row">
          <span>跳过</span>
          <span id="batchSummarySkipped" class="batch-summary-num">0</span>
        </div>
        <div class="batch-summary-row">
          <span>覆盖</span>
          <span id="batchSummaryOverwritten" class="batch-summary-num">0</span>
        </div>
        <div class="batch-summary-row">
          <span>耗时</span>
          <span id="batchSummaryTime" class="batch-summary-num">--</span>
        </div>
      </div>
      <div class="modal-actions">
        <button id="btnBatchSummaryContinue" class="btn-secondary">继续导入</button>
        <button id="btnBatchSummaryView" class="btn-primary">查看货架</button>
      </div>
    </div>
  </div>

  <!-- 零件详情弹窗 -->
  <div id="modalDetail" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card glass-card">
      <h3>零件详情</h3>
      <form id="formDetail">
        <input type="hidden" id="detailId">
        <label>编号（10位）</label>
        <input type="text" id="detailCode" pattern="\d{10}" maxlength="10" inputmode="numeric" placeholder="10位数字编号">
        <label>名称</label>
        <input type="text" id="detailName">
        <label>规格</label>
        <input type="text" id="detailSpecs">
        <label>数量</label>
        <input type="number" id="detailQuantity" min="0" value="1">
        <label>备注</label>
        <textarea id="detailNote" rows="2"></textarea>
        <div id="detailPosition" class="detail-position"></div>
        <div class="modal-actions">
          <button type="button" id="btnDetailDelete" class="btn-danger">删除</button>
          <button type="button" id="btnDetailCancel" class="btn-secondary">取消</button>
          <button type="submit" class="btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- OCR 识别结果弹窗（全局，所有页面上方） -->
  <div id="ocrResult" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card glass-card">
      <div class="ocr-result-header">识别结果</div>
      <div id="ocrResultContent" class="ocr-result-content"></div>
      <div class="ocr-result-actions" id="ocrActionsNormal">
        <button id="btnOcrConfirm" class="btn-primary">确认并存入货架</button>
        <button id="btnOcrRetry" class="btn-secondary">重新识别</button>
      </div>
      <div class="ocr-result-actions hidden" id="ocrActionsBatch">
        <button id="btnBatchConfirm" class="btn-primary">确认存入</button>
        <button id="btnBatchSkip" class="btn-secondary">跳过</button>
        <button id="btnBatchRetry" class="btn-secondary">重试</button>
        <button id="btnBatchManual" class="btn-secondary">手动输入</button>
        <button id="btnBatchEnd" class="btn-secondary">结束</button>
      </div>
    </div>
  </div>

  <!-- 登录弹窗 -->
  <div id="modalLogin" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card glass-card">
      <h3>登录</h3>
      <form id="formLogin" class="auth-form">
        <label>用户名</label>
        <input type="text" id="loginUsername" autocomplete="username" required>
        <label>密码</label>
        <input type="password" id="loginPassword" autocomplete="current-password" required>
        <div id="loginError" class="auth-error hidden"></div>
        <div class="modal-actions">
          <button type="button" id="btnLoginCancel" class="btn-secondary">取消</button>
          <button type="submit" class="btn-primary">登录</button>
        </div>
      </form>
      <p class="auth-link" id="btnGotoRegister">没有账号？立即注册</p>
    </div>
  </div>

  <!-- 注册弹窗 -->
  <div id="modalRegister" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card glass-card">
      <h3>注册</h3>
      <form id="formRegister" class="auth-form">
        <label>用户名</label>
        <input type="text" id="regUsername" autocomplete="username" required>
        <label>密码</label>
        <input type="password" id="regPassword" autocomplete="new-password" minlength="6" required>
        <label>确认密码</label>
        <input type="password" id="regPassword2" autocomplete="new-password" minlength="6" required>
        <div id="regError" class="auth-error hidden"></div>
        <div class="modal-actions">
          <button type="button" id="btnRegCancel" class="btn-secondary">取消</button>
          <button type="submit" class="btn-primary">注册</button>
        </div>
      </form>
      <p class="auth-link" id="btnGotoLogin">已有账号？去登录</p>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="src/js/db.js"></script>
  <script src="src/js/auth.js"></script>
  <script src="src/js/api.js"></script>
  <script src="src/js/camera.js"></script>
  <script src="src/js/ocr.js"></script>
  <script src="src/js/shelf.js"></script>
  <script src="src/js/export.js"></script>
  <script src="src/js/app.js"></script>
</body>
</html>
